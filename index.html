<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mock Interviewer</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #0d0d1a;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 20px;
        }

        p {
            color: #b0b8c5;
            font-size: 20px;
            margin-bottom: 30px;
        }

        button {
            background-color: #7F77DD;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 32px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #dcdcdc;
        }

    <div class="container">
        <h1>AI Mock Interviewer</h1>
